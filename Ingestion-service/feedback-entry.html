<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Ingestion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <h3 class="text-center mb-4">Send Feedback</h3>
                    
                    <div id="alertBox" class="alert d-none" role="alert"></div>

                    <form id="feedbackForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="user" id="userInput" class="form-control" placeholder="Anonymous" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea name="message" id="messageInput" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100">Send to System</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from reloading
            
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            const formData = new FormData(e.target);

            btn.disabled = true;
            btn.innerText = 'Processing...';

            try {
                const response = await fetch('submit.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = '\\^o^/ Success! Data sent to PHP microservice! \\^o^/';
                    alertBox.classList.remove('d-none');
                    e.target.reset(); // Clear form
                }
            } catch (error) {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'Error connecting to PHP server.';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send to System';
            }
        });
    </script>
</body>
</html>
